<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>場内得点表示</title>
<script src="common.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Helvetica Neue',Arial,sans-serif; background:#000; color:#fff; min-height:100vh; overflow:hidden; }

  /* 種目選択 */
  #setup { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px; background:#0f1923; }
  #setup h2 { font-size:28px; margin-bottom:8px; color:#dfaf4a; }
  #setup .sub { font-size:16px; color:#7a8a99; margin-bottom:40px; }
  .gender-tabs { display:flex; gap:16px; margin-bottom:24px; }
  .gender-tab { padding:16px 48px; background:#1a2634; border:2px solid #2a3a4a; border-radius:14px; font-size:22px; font-weight:700; cursor:pointer; }
  .gender-tab.active.mag { border-color:#4a9eff; background:#1a2a3e; color:#4a9eff; }
  .gender-tab.active.wag { border-color:#df4adf; background:#2e1a2e; color:#df4adf; }
  .apparatus-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; max-width:600px; width:100%; }
  .app-btn { padding:24px 16px; background:#1a2634; border:2px solid #2a3a4a; border-radius:16px; text-align:center; cursor:pointer; transition:all 0.2s; }
  .app-btn:hover { border-color:#dfaf4a; }
  .app-btn.selected { border-color:#dfaf4a; background:#2e261a; }
  .app-btn .icon { font-size:36px; margin-bottom:8px; }
  .app-btn .label { font-size:24px; font-weight:800; }
  .app-btn .full { font-size:13px; color:#7a8a99; margin-top:4px; }
  .btn-start { padding:20px 60px; background:#7a5a1a; border:none; border-radius:16px; color:#fff; font-size:22px; font-weight:700; cursor:pointer; }
  .btn-start:disabled { background:#2a3a4a; color:#4a5a6a; cursor:not-allowed; }

  /* 表示画面 */
  #display { display:none; flex-direction:column; min-height:100vh; background:#000; position:relative; }

  /* ヘッダー */
  .disp-header { padding:20px 40px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid #1a2634; }
  .disp-apparatus { font-size:28px; font-weight:800; color:#dfaf4a; }
  .disp-apparatus-full { font-size:16px; color:#7a8a99; margin-top:2px; }
  .conn-dot { width:10px; height:10px; border-radius:50%; background:#ff4a4a; display:inline-block; margin-right:8px; }
  .conn-dot.ok { background:#4adf8f; }

  /* メインコンテンツ */
  .disp-main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; }

  /* 待機状態 */
  .waiting { text-align:center; color:#2a3a4a; }
  .waiting-icon { font-size:80px; margin-bottom:24px; }
  .waiting-text { font-size:28px; font-weight:700; }

  /* 得点表示 */
  .score-display { width:100%; max-width:1200px; }

  /* 選手情報 */
  .athlete-row { display:flex; align-items:baseline; gap:20px; margin-bottom:24px; }
  .athlete-bib { font-size:64px; font-weight:900; color:#dfaf4a; font-variant-numeric:tabular-nums; line-height:1; }
  .athlete-name { font-size:72px; font-weight:900; line-height:1; }
  .athlete-org { font-size:28px; color:#7a8a99; margin-top:8px; }
  .athlete-cat { display:inline-block; background:#1a2a4a; color:#4a9eff; padding:4px 16px; border-radius:20px; font-size:20px; margin-right:12px; }

  /* スコアグリッド */
  .scores-row { display:flex; gap:20px; align-items:stretch; margin-bottom:32px; flex-wrap:wrap; }
  .score-box { background:#111d2a; border-radius:20px; padding:24px 28px; text-align:center; flex:1; min-width:140px; }
  .score-box .lbl { font-size:18px; color:#7a8a99; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
  .score-box .val { font-size:52px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
  .score-box.d .val { color:#df9f4a; }
  .score-box.eavg .val { color:#4a9eff; font-size:56px; }
  .score-box.nd .val { color:#ff6a6a; font-size:44px; }
  .score-box.bonus .val { color:#4adf8f; font-size:44px; }
  .score-box.e .val { color:#2a5a8a; font-size:40px; }

  /* SCORE大表示 */
  .score-final-box { background:#1a3a2a; border:3px solid #4adf8f; border-radius:24px; padding:32px 60px; text-align:center; margin-top:8px; }
  .score-final-box .lbl { font-size:22px; color:#7a8a99; text-transform:uppercase; letter-spacing:0.15em; margin-bottom:12px; }
  .score-final-box .val { font-size:120px; font-weight:900; color:#4adf8f; font-variant-numeric:tabular-nums; line-height:1; }

  /* NEW アニメーション */
  @keyframes slideIn {
    0% { opacity:0; transform:translateY(40px); }
    100% { opacity:1; transform:translateY(0); }
  }
  .animate-in { animation: slideIn 0.5s ease forwards; }

  /* 設定パネル（右クリックメニュー的なもの） */
  .settings-btn { position:fixed; bottom:20px; right:20px; padding:8px 16px; background:rgba(255,255,255,0.1); border:none; border-radius:8px; color:#7a8a99; font-size:12px; cursor:pointer; }
  .settings-btn:hover { background:rgba(255,255,255,0.2); }
  .settings-panel { display:none; position:fixed; bottom:60px; right:20px; background:#1a2634; border:1px solid #2a3a4a; border-radius:12px; padding:16px; min-width:200px; }
  .settings-panel.open { display:block; }
  .settings-panel label { display:flex; align-items:center; gap:8px; font-size:14px; margin-bottom:8px; cursor:pointer; }
  .settings-panel h4 { font-size:13px; color:#dfaf4a; margin-bottom:10px; }
  .change-btn { margin-top:12px; width:100%; padding:8px; background:#2a3a4a; border:none; border-radius:8px; color:#aaa; font-size:13px; cursor:pointer; }
</style>
</head>
<body>

<!-- 種目選択 -->
<div id="setup">
  <h2>🖥️ 場内得点表示</h2>
  <p class="sub">表示する種目を選択してください</p>
  <div class="gender-tabs">
    <div class="gender-tab mag active" id="tab-mag" onclick="selGender('MAG')">MAG</div>
    <div class="gender-tab wag" id="tab-wag" onclick="selGender('WAG')">WAG</div>
  </div>
  <div class="apparatus-grid" id="app-grid"></div>
  <button class="btn-start" id="btn-start" onclick="startDisplay()" disabled>この種目を表示開始 →</button>
</div>

<!-- 表示画面 -->
<div id="display">
  <div class="disp-header">
    <div>
      <div class="disp-apparatus" id="disp-apparatus"></div>
      <div class="disp-apparatus-full" id="disp-apparatus-full"></div>
    </div>
    <div style="font-size:16px;color:#7a8a99">
      <span class="conn-dot" id="conn-dot"></span><span id="conn-text">接続中...</span>
    </div>
  </div>
  <div class="disp-main" id="disp-main">
    <div class="waiting">
      <div class="waiting-icon">⏳</div>
      <div class="waiting-text">得点確定をお待ちください</div>
    </div>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">⚙️ 表示設定</button>
  <div class="settings-panel" id="settings-panel">
    <h4>表示項目</h4>
    <label><input type="checkbox" id="opt-bib" checked onchange="renderScore()"> BIB番号</label>
    <label><input type="checkbox" id="opt-org" checked onchange="renderScore()"> 所属</label>
    <label><input type="checkbox" id="opt-d" checked onchange="renderScore()"> D スコア</label>
    <label><input type="checkbox" id="opt-eavg" checked onchange="renderScore()"> E AVG</label>
    <label><input type="checkbox" id="opt-nd" checked onchange="renderScore()"> ND</label>
    <label><input type="checkbox" id="opt-bonus" checked onchange="renderScore()"> BONUS</label>
    <button class="change-btn" onclick="changeApparatus()">🔄 種目を変更</button>
  </div>
</div>

<script>
  let ws, myApparatus=null, selectedGender='MAG', selectedApp=null;
  let latestScore=null, stateData={};

  // ── セットアップ ──
  function selGender(g) {
    selectedGender=g; selectedApp=null;
    document.getElementById('tab-mag').className='gender-tab mag'+(g==='MAG'?' active':'');
    document.getElementById('tab-wag').className='gender-tab wag'+(g==='WAG'?' active':'');
    renderAppGrid();
    document.getElementById('btn-start').disabled=true;
  }
  function renderAppGrid() {
    const order=selectedGender==='MAG'?MAG_ORDER:WAG_ORDER;
    document.getElementById('app-grid').innerHTML=order.map(code=>{
      const a=APPARATUS[code];
      return `<div class="app-btn ${selectedApp===code?'selected':''}" onclick="selApp('${code}')">
        <div class="icon">${a.icon}</div><div class="label">${a.label}</div><div class="full">${a.full}</div>
      </div>`;
    }).join('');
  }
  function selApp(code) { selectedApp=code; renderAppGrid(); document.getElementById('btn-start').disabled=false; }
  function startDisplay() {
    if(!selectedApp)return;
    myApparatus=selectedApp;
    document.getElementById('setup').style.display='none';
    document.getElementById('display').style.display='flex';
    const a=APPARATUS[myApparatus];
    document.getElementById('disp-apparatus').textContent=`${a.icon} ${a.gender} ${a.label}`;
    document.getElementById('disp-apparatus-full').textContent=a.full;
    connectWS();
  }
  function changeApparatus() {
    document.getElementById('settings-panel').className='settings-panel';
    document.getElementById('display').style.display='none';
    document.getElementById('setup').style.display='flex';
    myApparatus=null; latestScore=null;
  }
  renderAppGrid();

  // URLパラメータで種目が指定されている場合は自動起動
  const urlParams = new URLSearchParams(location.search);
  const urlApp = urlParams.get('apparatus');
  if (urlApp && APPARATUS[urlApp]) {
    selectedApp = urlApp;
    selectedGender = APPARATUS[urlApp].gender;
    setTimeout(startDisplay, 100);
  }

  // ── WebSocket ──
  function connectWS() {
    const proto=location.protocol==='https:'?'wss':'ws';
    ws=new WebSocket(`${proto}://${location.host}`);
    ws.onopen=()=>{ setConn(true); ws.send(JSON.stringify({type:'REQUEST_STATE'})); };
    ws.onclose=()=>{ setConn(false); setTimeout(connectWS,2000); };
    ws.onmessage=(e)=>{
      const msg=JSON.parse(e.data);
      if(msg.type==='INIT'||msg.type==='STATE_UPDATE') {
        stateData=msg.state;
        // 編集・取り消しなど明示的なユーザー操作による更新では自動切り替えしない
        // （「場内表示に反映しますか？」で「はい」を選んだ場合のみ DISPLAY_FORCE_SHOW で切り替える）
        if(msg.skipDisplayAuto) return;
        // この種目の最新確定得点を取得（通常の確定エントリ＋VT採用得点の両方を候補にする）
        const appConfirmed=(msg.state.confirmed||[]).filter(r=>r.apparatus===myApparatus);
        const vtFinalsForApp = Object.values(msg.state.vtFinals||{}).filter(v=>v.apparatus===myApparatus);
        const candidates = [...appConfirmed, ...vtFinalsForApp];
        if(candidates.length>0) {
          const newLatest = candidates.reduce((a,b)=> new Date(b.confirmedAt) > new Date(a.confirmedAt) ? b : a);
          if(!latestScore||JSON.stringify(newLatest)!==JSON.stringify(latestScore)){
            latestScore=newLatest;
            renderScore();
          }
        }
      }
      if(msg.type==='SCORE_CONFIRMED'&&msg.result.apparatus===myApparatus){
        latestScore=msg.result;
        renderScore();
      }
      if(msg.type==='VT_FINAL_CONFIRMED'&&msg.apparatus===myApparatus){
        latestScore=msg.result; // method/vault1Score/vault2Scoreを持つVT採用得点
        renderScore();
      }
      if(msg.type==='DISPLAY_FORCE_SHOW'&&msg.apparatus===myApparatus){
        latestScore=msg.result;
        flashAndRender();
      }
    };
  }

  // 点滅して再表示（更新感を出す）
  function flashAndRender(){
    const main=document.getElementById('disp-main');
    main.style.transition='opacity 0.25s';
    main.style.opacity='0';
    setTimeout(()=>{
      renderScore();
      main.style.opacity='1';
    }, 280);
  }
  function setConn(ok){
    document.getElementById('conn-dot').className='conn-dot'+(ok?' ok':'');
    document.getElementById('conn-text').textContent=ok?'接続済み':'再接続中...';
  }

  // ── 表示設定 ──
  function toggleSettings(){ document.getElementById('settings-panel').classList.toggle('open'); }
  function get(id){ return document.getElementById(id)?.checked; }

  // ── 得点描画 ──
  function renderScore() {
    const main=document.getElementById('disp-main');
    if(!latestScore){ main.innerHTML='<div class="waiting"><div class="waiting-icon">⏳</div><div class="waiting-text">得点確定をお待ちください</div></div>'; return; }

    const r=latestScore;

    // VT（跳馬）2本採用得点の場合は専用レイアウト
    if (r.method) {
      let html='<div class="score-display animate-in">';
      html+=`<div class="athlete-row">`;
      if(get('opt-bib')) html+=`<div class="athlete-bib">${r.athlete?.bib||''}</div>`;
      html+=`<div><div class="athlete-name">${r.athlete?.name||''}</div>`;
      if(get('opt-org')) html+=`<div class="athlete-org"><span class="athlete-cat">${r.athlete?.category||''}</span>${r.athlete?.club||''}</div>`;
      html+=`</div></div>`;
      const methodLabel = r.method==='avg' ? '2本平均' : '高い方採用';
      html+='<div class="scores-row">';
      html+=`<div class="score-box d"><div class="lbl">1本目</div><div class="val">${Number(r.vault1Score).toFixed(3)}</div></div>`;
      html+=`<div class="score-box eavg"><div class="lbl">2本目</div><div class="val">${Number(r.vault2Score).toFixed(3)}</div></div>`;
      html+='</div>';
      html+=`<div class="score-final-box"><div class="lbl">SCORE（${methodLabel}）</div><div class="val">${Number(r.finalScore).toFixed(3)}</div></div>`;
      html+='</div>';
      main.innerHTML=html;
      return;
    }

    const settings=stateData.settings||{};
    const eCount=Number(settings.eJudgeCount)||4;
    const eKeys=['E1','E2','E3','E4','E5','E6'].slice(0,eCount);

    let html='<div class="score-display animate-in">';

    // 選手情報
    html+=`<div class="athlete-row">`;
    if(get('opt-bib')) html+=`<div class="athlete-bib">${r.athlete?.bib||''}</div>`;
    html+=`<div><div class="athlete-name">${r.athlete?.name||''}</div>`;
    if(get('opt-org')) html+=`<div class="athlete-org"><span class="athlete-cat">${r.athlete?.category||''}</span>${r.athlete?.club||''}</div>`;
    html+=`</div></div>`;

    // スコアボックス
    html+='<div class="scores-row">';
    if(get('opt-d'))    html+=`<div class="score-box d"><div class="lbl">D</div><div class="val">${Number(r.dScore).toFixed(1)}</div></div>`;
    if(get('opt-eavg')) html+=`<div class="score-box eavg"><div class="lbl">E AVG</div><div class="val">${Number(r.eAvg).toFixed(3)}</div></div>`;
    if(get('opt-nd'))   html+=`<div class="score-box nd"><div class="lbl">ND</div><div class="val">-${Number(r.nd||0).toFixed(1)}</div></div>`;
    if(get('opt-bonus'))html+=`<div class="score-box bonus"><div class="lbl">BONUS</div><div class="val">+${Number(r.stickBonus||0).toFixed(1)}</div></div>`;
    html+='</div>';

    // SCORE大表示
    html+=`<div class="score-final-box"><div class="lbl">SCORE</div><div class="val">${Number(r.finalScore).toFixed(3)}</div></div>`;
    html+='</div>';

    main.innerHTML=html;
  }

  // 設定パネル以外をクリックで閉じる
  document.addEventListener('click', e=>{
    if(!e.target.closest('.settings-panel')&&!e.target.closest('.settings-btn')){
      document.getElementById('settings-panel').className='settings-panel';
    }
  });
</script>
</body>
</html>
